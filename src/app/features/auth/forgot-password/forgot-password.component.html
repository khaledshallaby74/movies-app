<div class="forgot-password-container">
  <!-- ==================== Material Stepper ==================== -->
  <mat-horizontal-stepper #stepper linear>
    <!-- ==================== Step 1: Enter Email ==================== -->
    <mat-step [stepControl]="emailForm">
      <form [formGroup]="emailForm">
        <ng-template matStepLabel>Enter Your Email</ng-template>
        <!-- Email Input -->
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
          <!-- Error messages -->
          <mat-error *ngIf="emailForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="emailForm.get('email')?.hasError('email')">
            Invalid email format
          </mat-error>
        </mat-form-field>
        <!-- Action button -->
        <div class="actions">
          <button mat-raised-button color="primary" (click)="sendResrtCode(stepper)" [disabled]="loading">
            {{ loading ? 'Sending...' : 'Send Reset Code' }}
          </button>
        </div>
      </form>
    </mat-step>
    <!-- ==================== Step 2: Enter OTP ==================== -->
    <mat-step [stepControl]="otpForm">
      <form [formGroup]="otpForm">
        <ng-template matStepLabel>Enter OTP</ng-template>
        <!-- OTP Inputs -->
        <div class="otp-container">
          <input matInput maxlength="1" formControlName="digit1" (input)="onOtpInput($event, 0)" (keydown)="onOtpKeyDown($event, 0)" #otpInput />
          <input matInput maxlength="1" formControlName="digit2" (input)="onOtpInput($event, 1)" (keydown)="onOtpKeyDown($event, 1)" #otpInput />
          <input matInput maxlength="1" formControlName="digit3" (input)="onOtpInput($event, 2)" (keydown)="onOtpKeyDown($event, 2)" #otpInput />
          <input matInput maxlength="1" formControlName="digit4" (input)="onOtpInput($event, 3)" (keydown)="onOtpKeyDown($event, 3)" #otpInput />
          <input matInput maxlength="1" formControlName="digit5" (input)="onOtpInput($event, 4)" (keydown)="onOtpKeyDown($event, 4)" #otpInput />
          <input matInput maxlength="1" formControlName="digit6" (input)="onOtpInput($event, 5)" (keydown)="onOtpKeyDown($event, 5)" #otpInput />
        </div>
        <!-- Countdown display -->
        <div class="countdown" *ngIf="(countDown$ | async) as count">
          <span *ngIf="count > 0">
            Resend available in {{ count }} seconds
          </span>
        </div>
        <!-- Action buttons -->
        <div class="actions">
          <button mat-raised-button color="primary" (click)="verifyOtp(stepper)" [disabled]="loading">
            {{ loading ? 'Verifying...' : 'Verify OTP' }}
          </button>
          <button mat-button color="accent" (click)="resendCode()" [disabled]="(resendDisable$ | async)">
            Resend Code
          </button>
        </div>
      </form>
    </mat-step>
    <!-- ==================== Step 3: Reset Password ==================== -->
    <mat-step [stepControl]="resetForm">
      <form [formGroup]="resetForm">
        <ng-template matStepLabel>Reset Password</ng-template>
        <!-- New Password Input -->
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>New Password</mat-label>
          <input matInput type="password" formControlName="newPassword" />
        </mat-form-field>
        <!-- Confirm Password Input -->
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Confirm Password</mat-label>
          <input matInput type="password" formControlName="confirmPassword" />
          <mat-error *ngIf="resetForm.hasError('mismatch')">
            Passwords do not match
          </mat-error>
        </mat-form-field>
        <!-- Action button -->
        <div class="actions">
          <button mat-raised-button color="primary" (click)="setNewPassword(stepper)" [disabled]="loading">
            {{ loading ? 'Resetting...' : 'Reset Password' }}
          </button>
        </div>
      </form>
    </mat-step>
  </mat-horizontal-stepper>
</div>
